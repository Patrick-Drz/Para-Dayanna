<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Dayanna - Cosmos</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background: radial-gradient(circle at center, #1a0b2e 0%, #05050a 100%);
            font-family: 'Quicksand', sans-serif;
            overflow: hidden;
            position: relative;
        }

        body::before {
            content: "";
            position: absolute;
            width: 2px;
            height: 2px;
            background: transparent;
            box-shadow: 
                50vw 20vh #fff, 10vw 80vh #fff, 90vw 50vh #fff, 
                75vw 15vh #eee, 25vw 70vh #eee, 40vw 30vh #fff,
                60vw 85vh #ddd, 85vw 10vh #fff, 15vw 45vh #ddd,
                33vw 12vh #fff, 66vw 75vh #eee, 95vw 90vh #ddd;
            border-radius: 50%;
            opacity: 0.6;
            z-index: 0;
        }

        #main-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1;
        }

        #heart-click-area {
            position: absolute;
            top: 50%;
            left: 50%;
            display: flex;
            align-items: center;
            cursor: pointer;
            z-index: 10;
        }

        #heart-icon {
            width: 30px;
            height: 30px;
            background-color: #cc0033;
            position: relative;
            transform: rotate(-45deg);
            margin-right: 15px;
            box-shadow: 0 0 15px rgba(204, 0, 51, 0.8);
        }

        #heart-icon:before, #heart-icon:after {
            content: "";
            width: 30px;
            height: 30px;
            background-color: #cc0033;
            border-radius: 50%;
            position: absolute;
        }
        #heart-icon:before { top: -15px; left: 0; }
        #heart-icon:after { top: 0; left: 15px; }

        #click-text {
            color: #ffffff;
            font-weight: 700;
            font-size: 1.2rem;
            border-bottom: 2px solid #ffffff;
            line-height: 1.2;
        }

        #end-screen-wrap {
            display: none; 
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            z-index: 5;
            padding: 4vh 0;
            box-sizing: border-box;
        }

        #big-heart-container {
            position: relative;
            width: 320px; 
            height: 320px;
            margin-bottom: 40px; 
        }

        .leaf-heart {
            position: absolute;
            width: 16px; 
            height: 16px;
            transform: rotate(-45deg);
            opacity: 0;
            background-color: var(--heart-color);
            box-shadow: 0 0 5px rgba(0,0,0,0.3); 
            will-change: transform, opacity; 
        }

        .leaf-heart:before, .leaf-heart:after {
            content: "";
            width: 16px;
            height: 16px;
            border-radius: 50%;
            position: absolute;
            background-color: var(--heart-color);
        }
        .leaf-heart:before { top: -8px; left: 0; }
        .leaf-heart:after { top: 0; left: 8px; }

        #text-area {
            position: relative;
            width: 85%;
            max-width: 500px;
            text-align: center;
            display: none; 
        }

        #message-container {
            color: #ffffff;
            font-size: 1.05rem; 
            line-height: 1.15;   
            margin-bottom: 10px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5); 
        }

        #timer-container {
            color: rgba(255, 255, 255, 0.9);
            font-size: 0.9rem;
            display: none;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            padding-top: 10px;
            margin-top: 10px;
        }

        .time-item {
            display: inline-block;
            margin: 0 3px;
        }

        .time-number {
            font-size: 1.2rem; 
            font-weight: 700;
            color: #ff3366;
            text-shadow: 0 0 10px rgba(255, 51, 102, 0.6);
        }

        #restart-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            cursor: pointer;
            display: none; 
            align-items: center;
            justify-content: center;
            z-index: 100;
            transition: background 0.3s;
            backdrop-filter: blur(5px);
        }

        #restart-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        #restart-btn svg {
            fill: white;
            width: 24px;
            height: 24px;
        }

        #ground {
            position: absolute;
            bottom: 50px;
            left: 0;
            width: 100%;
            height: 1px;
            background-color: rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body>

    <div id="main-container">
        <div id="heart-click-area">
            <div id="heart-icon"></div>
            <span id="click-text">haz clic</span>
        </div>

        <div id="end-screen-wrap">
            <div id="big-heart-container"></div>
            
            <div id="text-area">
                <div id="message-container"></div>
                <div id="timer-container">
                    Mi amor por ti comenzó hace... 💘<br>
                    <span class="time-item"><span id="days" class="time-number">0</span>d</span>
                    <span class="time-item"><span id="hours" class="time-number">0</span>h</span>
                    <span class="time-item"><span id="minutes" class="time-number">0</span>m</span>
                    <span class="time-item"><span id="seconds" class="time-number">0</span>s</span>
                </div>
            </div>
        </div>
        <div id="ground"></div>
    </div>

    <button id="restart-btn" title="Ver de nuevo">
        <svg viewBox="0 0 24 24"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
    </button>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <script>
        gsap.set("#heart-click-area", { xPercent: -50, yPercent: -50 });

        const clickArea = document.getElementById('heart-click-area');
        const clickText = document.getElementById('click-text');
        const heartIcon = document.getElementById('heart-icon');
        const endScreenWrap = document.getElementById('end-screen-wrap');
        const bigHeartContainer = document.getElementById('big-heart-container');
        const textArea = document.getElementById('text-area');
        const msgContainer = document.getElementById('message-container');
        const timerContainer = document.getElementById('timer-container');
        const restartBtn = document.getElementById('restart-btn');

        const textMessage = "Para la chica de mi corazón, Dayanna ❤️✨:\n\nQuiero que sepas que eres una gran mujer, muy valiente y admiro muchísimo cómo te esfuerzas cada día 🥺. Valoro profundamente todo lo que haces por mí 🙏.\n\nMe encantan tus ojos y esa forma tan linda en la que brillan ✨, la curva de tus labios cuando sonríes 😊, y absolutamente cada pequeño detalle que te hace ser tú. Me fascina todo de ti 💖.\n\nTe deseo un feliz Día de las Madres (Sé que tus gatitos están muy orgullosos de la mamá que tienen 🐈🐾).\n\nTe quiero mucho 🥰🌹";
        
        const startDate = new Date('2026-02-15T00:00:00'); 
        const colors = ['#ff3366', '#ff6699', '#ff9933', '#ffcc00', '#ff99cc', '#ff0033'];

        function createUltraDetailedHeart() {
            const containerSize = 320; 
            const centerX = containerSize / 2;
            const centerY = 145; 
            const heartsArray = [];
            const scaleMultiplier = 8.5;

            const outlineSteps = 150; 
            for (let i = 0; i < outlineSteps; i++) {
                let t = (i / outlineSteps) * Math.PI * 2;
                let bx = 16 * Math.pow(Math.sin(t), 3);
                let by = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
                let px = centerX + (bx * scaleMultiplier);
                let py = centerY + (by * scaleMultiplier);
                createHeartElement(px, py, heartsArray, 'outline');
            }

            const fillCount = 650; 
            for (let i = 0; i < fillCount; i++) {
                let t = Math.random() * Math.PI * 2;
                let r = Math.sqrt(Math.random()) * 0.99; 
                let bx = 16 * Math.pow(Math.sin(t), 3);
                let by = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
                let px = centerX + (bx * r * scaleMultiplier);
                let py = centerY + (by * r * scaleMultiplier);
                createHeartElement(px, py, heartsArray, 'fill');
            }
            return heartsArray;
        }

        function createHeartElement(x, y, heartsArray, type) {
            const heart = document.createElement('div');
            heart.classList.add('leaf-heart');
            const size = type === 'outline' ? 14 : (11 + Math.random() * 9);
            heart.style.width = `${size}px`;
            heart.style.height = `${size}px`;
            const color = colors[Math.floor(Math.random() * colors.length)];
            heart.style.setProperty('--heart-color', color); 
            bigHeartContainer.appendChild(heart);
            gsap.set(heart, { x: x, y: y, xPercent: -50, yPercent: -50, scale: 0, rotation: -45 + (Math.random() * 40 - 20)});
            heartsArray.push(heart);
        }

        function updateTimer() {
            const now = new Date();
            const diff = now - startDate;
            document.getElementById('days').innerText = Math.floor(diff / (1000 * 60 * 60 * 24));
            document.getElementById('hours').innerText = String(Math.floor((diff / (1000 * 60 * 60)) % 24)).padStart(2, '0');
            document.getElementById('minutes').innerText = String(Math.floor((diff / 1000 / 60) % 60)).padStart(2, '0');
            document.getElementById('seconds').innerText = String(Math.floor((diff / 1000) % 60)).padStart(2, '0');
        }

        function typeWriter() {
            textArea.style.display = 'block';
            let i = 0;
            const chars = Array.from(textMessage); 
            function type() {
                if (i < chars.length) {
                    let char = chars[i];
                    msgContainer.innerHTML += (char === '\n') ? '<br>' : char;
                    i++;
                    setTimeout(type, 65); 
                } else {
                    timerContainer.style.display = 'block';
                    gsap.from(timerContainer, { duration: 1, opacity: 0, y: 15 });
                    setInterval(updateTimer, 1000);
                    updateTimer();
                    restartBtn.style.display = 'flex';
                    gsap.from(restartBtn, { duration: 0.5, scale: 0, opacity: 0, ease: "back.out(1.7)" });
                }
            }
            type();
        }

        clickArea.addEventListener('click', () => {
            const tl = gsap.timeline();
            tl.to(clickText, { duration: 0.3, opacity: 0 });
            const dropDistance = (window.innerHeight - 50) - clickArea.getBoundingClientRect().top - 30; 
            tl.to(clickArea, { duration: 1.2, y: `+=${dropDistance}`, ease: "bounce.out" });
            tl.to(heartIcon, { duration: 0.3, scale: 0, opacity: 0, onComplete: () => {
                clickArea.style.display = 'none';
                endScreenWrap.style.display = 'flex';
            }});
            tl.call(() => {
                const hearts = createUltraDetailedHeart();
                gsap.to(hearts, { duration: 1.3, opacity: 1, scale: 1, stagger: { amount: 1.8, from: "random" }, ease: "back.out(1.1)" });
            });
            tl.to({}, { duration: 2.2 }); 
            tl.call(() => typeWriter());
        });

        restartBtn.addEventListener('click', () => {
            location.reload();
        });
    </script>
</body>
</html>
